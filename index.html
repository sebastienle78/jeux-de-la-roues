<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roue de la Fortune</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .stats {
            font-size: 24px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
        }

        /* La flèche */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .btn-spin {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-spin:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .btn-spin:hover:not(:disabled) {
            background-color: #2ecc71;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="stats">Points : <span id="score">100</span></div>

    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>

    <button class="btn-spin" id="spinBtn">Miser 1 pt & Tourner</button>
    <div id="message"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const scoreDisplay = document.getElementById('score');
        const message = document.getElementById('message');

        let score = 100;
        let isSpinning = false;

        const sectors = [
            { label: "PERDU", color: "#34495e", win: 0 },
            { label: "+2 pts", color: "#2ecc71", win: 2 },
            { label: "PERDU", color: "#2c3e50", win: 0 },
            { label: "+5 pts", color: "#f1c40f", win: 5 },
            { label: "PERDU", color: "#34495e", win: 0 },
            { label: "+10 pts", color: "#e67e22", win: 10 },
            { label: "PERDU", color: "#2c3e50", win: 0 },
            { label: "+20 pts", color: "#9b59b6", win: 20 },
            { label: "PERDU", color: "#34495e", win: 0 },
            { label: "+2 pts", color: "#27ae60", win: 2 }
        ];

        const numSectors = sectors.length;
        const arc = 2 * Math.PI / numSectors;
        let currentRotation = 0;

        function drawWheel() {
            sectors.forEach((sector, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = sector.color;
                ctx.moveTo(175, 175);
                ctx.arc(175, 175, 175, angle, angle + arc);
                ctx.lineTo(175, 175);
                ctx.fill();
                ctx.stroke();

                // Texte
                ctx.save();
                ctx.translate(175, 175);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Arial";
                ctx.fillText(sector.label, 160, 10);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.addEventListener('click', () => {
            if (isSpinning || score < 1) return;

            // Mise
            score -= 1;
            scoreDisplay.textContent = score;
            message.textContent = "La roue tourne...";
            isSpinning = true;
            spinBtn.disabled = true;

            // Calcul de la rotation
            const spinRotation = Math.floor(Math.random() * 360) + 1440; // Au moins 4 tours
            currentRotation += spinRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;

                // Calcul du résultat
                const actualRotation = currentRotation % 360;
                // La flèche est en haut (270 deg sur le cercle trigonométrique)
                const sectorIndex = Math.floor((360 - (actualRotation % 360) + 270) % 360 / (360 / numSectors));
                const result = sectors[sectorIndex];

                if (result.win > 0) {
                    score += result.win;
                    message.textContent = `GAGNÉ ! +${result.win} points !`;
                    message.style.color = "#2ecc71";
                } else {
                    message.textContent = "Dommage... Perdu !";
                    message.style.color = "#e74c3c";
                }
                scoreDisplay.textContent = score;

                if (score <= 0) {
                    message.textContent = "PLUS DE POINTS ! GAME OVER.";
                    spinBtn.disabled = true;
                }
            }, 4000);
        });
    </script>
</body>
</html>
