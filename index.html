7<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Rituel Quotidien</title>
    <style>
        body {
            background: radial-gradient(circle, #2c003e 0%, #000000 100%);
            color: #f1d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }

        h1 { font-style: italic; font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; }

        .wheel-container { position: relative; width: 320px; height: 320px; box-shadow: 0 0 50px rgba(186, 85, 211, 0.2); border-radius: 50%; }

        .arrow {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-top: 25px solid #ff4d6d; z-index: 10;
        }

        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #f1d4d4; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }

        .btn-spin {
            margin-top: 40px; padding: 12px 35px; font-size: 18px;
            background: transparent; color: #f1d4d4; border: 1px solid #f1d4d4;
            border-radius: 50px; cursor: pointer; transition: 0.4s;
        }

        .btn-spin:hover:not(:disabled) { background: #f1d4d4; color: #2c003e; }

        .btn-spin:disabled { opacity: 0.3; cursor: not-allowed; }

        #notifyBtn {
            display: none; margin-top: 15px; padding: 10px 20px;
            background-color: #25D366; color: white; border: none; border-radius: 5px; text-decoration: none; font-weight: bold;
        }

        #message { margin-top: 25px; font-size: 1.2rem; text-align: center; max-width: 80%; min-height: 1.5em; color: #ff4d6d; }
    </style>
</head>
<body>

    <h1>Notre Rituel Privé</h1>

    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>

    <button class="btn-spin" id="spinBtn">Tenter ma chance</button>
    <div id="message"></div>
    <a id="notifyBtn" href="#" target="_blank">Envoyer le résultat à mon chéri ✉️</a>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const message = document.getElementById('message');
        const notifyBtn = document.getElementById('notifyBtn');

        // --- CONFIGURATION ---
       const sectors = [
            { label: "Gage au choix", color: "#FFD700" },
            { label: "Petit-déjeuner au lit", color: "#FF8C00" },
            { label: "Massage 15 min", color: "#FF4500" },
            { label: "Bisous langoureux", color: "#FF1493" },
            { label: "Vérité ou Défi", color: "#00BFFF" },
            { label: "PERDU", color: "#4B0082" },
            { label: "Gâterie buccale", color: "#DC143C" },
            { label: "Dîner en amoureux", color: "#32CD32" },
            { label: "Jeu exotique ce soir", color: "#9400D3" },
            { label: "PERDU", color: "#2F4F4F" },
            { label: "Parler fantasmes", color: "#000080" },
            { label: "Câlin tendresse", color: "#FF69B4" }
        ];

                const arc = 2 * Math.PI / sectors.length;
        const rotationInitiale = -90 - (180 / sectors.length);
        let currentRotation = rotationInitiale;
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        function drawWheel() {
            sectors.forEach((sector, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = sector.color;
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 2;
                
               ctx.moveTo(160, 160);
                ctx.arc(160, 160, 150, angle, angle + arc);
                ctx.fill();
                ctx.stroke();
                ctx.save();

                ctx.translate(160, 160);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 10px Arial";
                ctx.fillText(sector.label, 135, 5);
                ctx.restore();
            });
        }

        drawWheel();


      function checkPlayability() {
            const lastPlay = localStorage.getItem('lastPlayDate');
            const today = new Date().toDateString();
            
            if (lastPlay === today) {
                spinBtn.disabled = true;
                message.textContent = "Tu as déjà joué aujourd'hui. Patience...";
            } else {
                spinBtn.disabled = false;
                message.textContent = "";
            }
        }

        checkPlayability();

        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;
            const spinRotation = Math.floor(Math.random() * 360) + 1800;
            currentRotation += spinRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualRotation = currentRotation % 360;
                const sectorIndex = Math.floor((360 - (actualRotation % 360) + 270) % 360 / (360 / sectors.length));
                const result = sectors[sectorIndex].label;

                message.textContent = "Résultat : " + result;
                localStorage.setItem('lastPlayDate', new Date().toDateString());

                // Bouton WhatsApp
               const text = encodeURIComponent("🎡 *RÉSULTAT DE NOTRE RITUEL* 🎡\n\nJ'ai tourné la roue et j'ai gagné :\n✨ " + result + " ✨\n\nÀ toi de jouer demain ! 😉");
notifyBtn.href = "https://wa.me/?text=" + text;
                notifyBtn.style.display = "inline-block";
            }, 5000);
        });
    </script>
</body>
</html>
